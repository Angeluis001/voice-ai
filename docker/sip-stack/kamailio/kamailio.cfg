#!KAMAILIO

debug=2
log_stderror=yes
fork=yes
children=4

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
alias="sip.telair.net.au"

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "xlog.so"

request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("REGISTER")) {
        sl_send_reply("200", "REGISTER accepted at edge");
        exit;
    }

    if (is_method("INVITE")) {
        # Keep 9196 as the local media health check on FreeSWITCH.
        if (search("^INVITE sip:9196(@| )")) {
            if (!t_relay_to("udp:freeswitch:5080")) {
                sl_reply_error();
            }
            exit;
        }

        # Everything else, including carrier ingress, goes to the SIP app layer.
        if (!t_relay_to("udp:drachtio-server:5060")) {
            sl_reply_error();
        }
        exit;
    }

    if (!t_relay_to("udp:drachtio-server:5060")) {
        sl_reply_error();
    }
    exit;
}
